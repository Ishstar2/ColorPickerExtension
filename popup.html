<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Picker</title>
  <style>
    :root {
      --bg: #fdfbf7;
      --card-bg: #f5f0eb;
      --card-border: #e6ded6;
      --text-main: #3d2b1f;
      --text-muted: #8c7a6b;
      --primary: #8c5a3c;
      --primary-hover: #73472e;
      --success: #5a7a58;
      --danger: #b85450;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Curving the main popup window */
    html {
      border-radius: 16px;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      width: 270px;
      padding: 14px;
      user-select: none;
      border-radius: 16px;
      border: 1px solid var(--card-border);
      overflow: hidden;
    }

    /* Hero Banner / Color Swatch */
    .hero-card {
      position: relative;
      width: 100%;
      height: 90px;
      border-radius: 12px;
      background-color: #e6ded6;
      border: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 10px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.05);
      transition: background-color 0.25s ease;
    }

    .hero-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(61, 43, 31, 0.6);
      backdrop-filter: blur(4px);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .color-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 16px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Format Switcher Pills */
    .segmented-control {
      display: flex;
      background-color: var(--card-bg);
      padding: 3px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      margin-bottom: 12px;
      gap: 2px;
    }

    .segment-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 6px 0;
      font-size: 10px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .segment-btn:hover:not(.active) {
      color: var(--text-main);
      background-color: rgba(140, 90, 60, 0.08);
    }

    .segment-btn.active {
      background-color: var(--primary);
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(140, 90, 60, 0.25);
    }

    .segment-btn:active {
      transform: scale(0.96);
    }

    /* Primary Actions */
    .action-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      width: 100%;
    }

    .btn {
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    .btn-main {
      flex: 2;
      background-color: var(--primary);
      color: #ffffff;
      box-shadow: 0 2px 6px rgba(140, 90, 60, 0.2);
    }

    .btn-main:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(140, 90, 60, 0.3);
    }

    .btn-main:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 1px 4px rgba(140, 90, 60, 0.2);
    }

    .btn-sub {
      flex: 1;
      background-color: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--card-border);
      display: none; /* hidden until color picked */
    }

    .btn-sub:hover {
      background-color: #ebdcd0;
      border-color: #d9c8bb;
      transform: translateY(-1px);
    }

    .btn-sub:active {
      transform: translateY(0) scale(0.98);
    }

    /* Palette Grid */
    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 12px;
      min-height: 38px;
    }

    .swatch-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
    }

    .swatch {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease;
    }

    .swatch:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 4px 10px rgba(61, 43, 31, 0.15);
    }

    .swatch:active {
      transform: translateY(0) scale(0.95);
    }

    .delete-btn {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 14px;
      height: 14px;
      background-color: var(--danger);
      color: #fff;
      border-radius: 50%;
      font-size: 10px;
      border: none;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .delete-btn:hover {
      transform: scale(1.15);
    }

    .swatch-wrapper:hover .delete-btn {
      display: flex;
    }

    /* Footer Buttons */
    .btn-footer {
      width: 100%;
      background-color: transparent;
      color: var(--text-muted);
      border: 1px dashed var(--card-border);
      font-size: 10px;
      padding: 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-footer:hover {
      border-color: var(--primary);
      color: var(--primary);
      background-color: rgba(140, 90, 60, 0.06);
    }

    .btn-footer:active {
      transform: scale(0.99);
    }

    .btn-shortcut {
      border-style: solid;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <div id="preview" class="hero-card">
    <div id="formatBadge" class="hero-badge">HEX</div>
    <div id="colorValue" class="color-value">#------</div>
  </div>

  <div class="segmented-control">
    <button class="segment-btn active" data-format="HEX">HEX</button>
    <button class="segment-btn" data-format="RGB">RGB</button>
    <button class="segment-btn" data-format="HSL">HSL</button>
  </div>

  <div class="action-row">
    <button id="pickBtn" class="btn btn-main">Pick Color</button>
    <button id="copyBtn" class="btn btn-sub">Copy</button>
    <button id="saveBtn" class="btn btn-sub">Save</button>
  </div>

  <div class="section-title">Saved Palette</div>
  <div id="palette" class="palette-grid"></div>

  <button id="exportBtn" class="btn-footer">Export CSS Variables</button>
  <button id="shortcutBtn" class="btn-footer btn-shortcut">⚙️ Customize Keyboard Shortcut</button>

  <script src="popup.js"></script>
</body>
</html>
