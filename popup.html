<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utility Hub</title>
  <style>
    :root { --bg: #fdfbf7; --card-bg: #f5f0eb; --border: #e6ded6; --text: #3d2b1f; --muted: #8c7a6b; --primary: #8c5a3c; --danger: #b85450; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); width: 280px; padding: 10px; user-select: none; }
    .app-card { background: var(--bg); border: 1px solid var(--border); border-radius: 18px; padding: 12px; box-shadow: 0 4px 12px rgba(61,43,31,0.08); }
    .tool-view { display: none; } .tool-view.active { display: block; }
    .view-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .btn-back { background: var(--card-bg); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 4px 8px; font-size: 10px; font-weight: 700; cursor: pointer; }
    .btn-back:hover { background: #ebdcd0; color: var(--primary); }
    .home-header { text-align: center; margin-top: 4px; margin-bottom: 14px; }
    .home-title { font-size: 16px; font-weight: 800; }
    .home-subtitle, .hero-badge, .section-title, .stat-label, .calc-expression { font-size: 9px; color: var(--muted); }
    .home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 10px; margin-bottom: 14px; padding: 0 4px; }
    .app-launch-card { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-align: center; }
    .app-icon-square { 
      width: 100%; 
      aspect-ratio: 1; 
      background: var(--card-bg); 
      border: 1px solid var(--border); 
      border-radius: 14px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      box-shadow: 0 2px 6px rgba(61,43,31,0.05);
      transition: transform 0.15s ease, background 0.15s ease;
      padding: 10px;
    }
    .app-icon-square img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    .app-launch-card:hover .app-icon-square { 
      transform: translateY(-2px); 
      background: #ebdcd0; 
      border-color: #d1c2b4;
    }
    .app-name { font-size: 10px; font-weight: 700; margin-top: 6px; color: var(--text); }
    .hero-card { position: relative; height: 75px; border-radius: 12px; background: #e6ded6; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; margin-bottom: 10px; }
    .hero-badge { position: absolute; top: 8px; right: 8px; background: rgba(61,43,31,0.6); padding: 2px 6px; border-radius: 4px; color: #fff; font-weight: 700; }
    .color-value { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace; font-size: 15px; font-weight: 800; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
    .segmented-control { display: flex; background: var(--card-bg); padding: 3px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; gap: 2px; }
    .segment-btn { flex: 1; background: transparent; border: none; color: var(--muted); padding: 5px 0; font-size: 10px; font-weight: 700; border-radius: 6px; cursor: pointer; }
    .segment-btn.active { background: var(--primary); color: #fff; }
    .action-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .btn { border: none; border-radius: 8px; font-size: 11px; font-weight: 600; padding: 8px 10px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .btn-main { flex: 2; background: var(--primary); color: #fff; }
    .btn-sub { flex: 1; background: var(--card-bg); border: 1px solid var(--border); }
    .section-title { font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
    .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; min-height: 38px; }
    .swatch-wrapper { position: relative; aspect-ratio: 1; }
    .swatch { width: 100%; height: 100%; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08); cursor: pointer; }
    .delete-btn { position: absolute; top: -3px; right: -3px; width: 14px; height: 14px; background: var(--danger); color: #fff; border-radius: 50%; font-size: 10px; border: none; display: none; align-items: center; justify-content: center; cursor: pointer; }
    .swatch-wrapper:hover .delete-btn { display: flex; }
    .btn-footer { width: 100%; background: transparent; color: var(--muted); border: 1px dashed var(--border); font-size: 10px; padding: 6px; border-radius: 8px; cursor: pointer; }
    .btn-footer:hover { border-color: var(--primary); color: var(--primary); }
    .btn-shortcut { border-style: solid; margin-top: 4px; }
    .text-input { width: 100%; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); padding: 8px; font-family: inherit; font-size: 11px; min-height: 60px; margin-bottom: 8px; outline: none; resize: vertical; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 2px; text-align: center; }
    .stat-number { font-size: 12px; font-weight: 800; color: var(--primary); display: block; }
    .stat-label { font-weight: 700; text-transform: uppercase; }
    .btn-danger { background: var(--danger); color: #fff; flex: 1; }
    .summary-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 11px; min-height: 65px; max-height: 110px; overflow-y: auto; margin-bottom: 8px; white-space: pre-wrap; }
    .calc-display { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; margin-bottom: 10px; text-align: right; }
    .calc-result { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace; font-size: 20px; font-weight: 800; }
    .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .calc-btn { background: var(--card-bg); border: 1px solid var(--border); font-size: 13px; font-weight: 700; padding: 10px 0; border-radius: 8px; cursor: pointer; }
    .calc-btn.op-btn { background: #e8ded4; color: var(--primary); }
    .calc-btn.action-btn { background: #ebd0ce; color: var(--danger); }
    .calc-btn.equals-btn { background: var(--primary); color: #fff; border-color: var(--primary); }
    .qr-preview { text-align: center; margin: 8px 0; display: flex; justify-content: center; }
    .qr-preview canvas { background: #fff; border-radius: 8px; border: 1px solid var(--border); padding: 6px; }
  </style>
</head>
<body>
  <div class="app-card">
    <div id="shared-header" class="view-header" style="display:none;">
      <button class="btn-back">← Home</button>
      <span id="header-title" class="section-title" style="margin:0;">Tool</span>
    </div>

    <div id="home-tool" class="tool-view active">
      <div class="home-header">
        <h1 class="home-title">Utility Hub</h1>
        <p class="home-subtitle">Tap an app to open</p>
      </div>
      <div class="home-grid">
        <div class="app-launch-card" data-launch="color-picker-tool" data-title="Color Picker">
          <div class="app-icon-square">
            <img src="icon-color.svg" alt="Color Picker">
          </div>
          <span class="app-name">Color Picker</span>
        </div>
        <div class="app-launch-card" data-launch="word-count-tool" data-title="Word Counter">
          <div class="app-icon-square">
            <img src="icon-word.svg" alt="Word Counter">
          </div>
          <span class="app-name">Word Counter</span>
        </div>
        <div class="app-launch-card" data-launch="ai-summarizer-tool" data-title="AI Summarizer">
          <div class="app-icon-square">
            <img src="icon-ai.svg" alt="AI Summarizer">
          </div>
          <span class="app-name">AI Summarizer</span>
        </div>
        <div class="app-launch-card" data-launch="calc-tool" data-title="Calculator">
          <div class="app-icon-square">
            <img src="icon-calc.svg" alt="Calculator">
          </div>
          <span class="app-name">Calculator</span>
        </div>
        <div class="app-launch-card" data-launch="qr-tool" data-title="QR Generator">
          <div class="app-icon-square">
            <img src="icon-qr.svg" alt="QR Code">
          </div>
          <span class="app-name">QR Code</span>
        </div>
      </div>
      <button class="btn-footer btn-shortcut open-shortcuts">⚙️ Keyboard Shortcuts</button>
    </div>

    <div id="color-picker-tool" class="tool-view">
      <div id="preview" class="hero-card"><div id="formatBadge" class="hero-badge">HEX</div><div id="colorValue" class="color-value">#------</div></div>
      <div class="segmented-control">
        <button class="segment-btn active" data-format="HEX">HEX</button>
        <button class="segment-btn" data-format="RGB">RGB</button>
        <button class="segment-btn" data-format="HSL">HSL</button>
      </div>
      <div class="action-row">
        <button id="pickBtn" class="btn btn-main">Pick Color</button>
        <button id="copyBtn" class="btn btn-sub" style="display:none;">Copy</button>
        <button id="saveBtn" class="btn btn-sub" style="display:none;">Save</button>
      </div>
      <div class="section-title">Saved Palette</div>
      <div id="palette" class="palette-grid"></div>
      <button id="exportBtn" class="btn-footer">Export CSS Variables</button>
      <button class="btn-footer btn-shortcut open-shortcuts">⚙️ Keyboard Shortcuts</button>
    </div>

    <div id="word-count-tool" class="tool-view">
      <textarea id="textInput" class="text-input" placeholder="Type or paste text here..." rows="4"></textarea>
      <div class="stats-grid">
        <div class="stat-card"><span id="statWords" class="stat-number">0</span><span class="stat-label">Words</span></div>
        <div class="stat-card"><span id="statChars" class="stat-number">0</span><span class="stat-label">Chars</span></div>
        <div class="stat-card"><span id="statCharsNoSpace" class="stat-number">0</span><span class="stat-label">No Space</span></div>
        <div class="stat-card"><span id="statReadTime" class="stat-number">0m</span><span class="stat-label">Read Time</span></div>
      </div>
      <div class="action-row">
        <button id="copyTextBtn" class="btn btn-main">Copy Text</button>
        <button id="clearTextBtn" class="btn btn-danger">Clear</button>
      </div>
    </div>

    <div id="ai-summarizer-tool" class="tool-view">
      <textarea id="aiTextInput" class="text-input" placeholder="Paste article to summarize..." rows="3"></textarea>
      <div class="action-row">
        <button id="summarizeBtn" class="btn btn-main">Summarize</button>
        <button id="clearAiBtn" class="btn btn-danger">Clear</button>
      </div>
      <div class="section-title">Summary Result</div>
      <div id="summaryOutput" class="summary-box"><span style="color:var(--muted);font-style:italic;">Generated summary appears here...</span></div>
      <button id="copySummaryBtn" class="btn-footer">Copy Summary</button>
    </div>

    <div id="calc-tool" class="tool-view">
      <div class="calc-display"><div id="calcExpression" class="calc-expression"></div><div id="calcResult" class="calc-result">0</div></div>
      <div class="calc-grid">
        <button class="calc-btn action-btn" data-calc="clear">C</button>
        <button class="calc-btn action-btn" data-calc="back">⌫</button>
        <button class="calc-btn op-btn" data-calc="%">%</button>
        <button class="calc-btn op-btn" data-calc="/">÷</button>
        <button class="calc-btn" data-calc="7">7</button><button class="calc-btn" data-calc="8">8</button><button class="calc-btn" data-calc="9">9</button>
        <button class="calc-btn op-btn" data-calc="*">×</button>
        <button class="calc-btn" data-calc="4">4</button><button class="calc-btn" data-calc="5">5</button><button class="calc-btn" data-calc="6">6</button>
        <button class="calc-btn op-btn" data-calc="-">−</button>
        <button class="calc-btn" data-calc="1">1</button><button class="calc-btn" data-calc="2">2</button><button class="calc-btn" data-calc="3">3</button>
        <button class="calc-btn op-btn" data-calc="+">+</button>
        <button class="calc-btn" data-calc="0" style="grid-column: span 2;">0</button>
        <button class="calc-btn" data-calc=".">.</button>
        <button class="calc-btn equals-btn" data-calc="=">=</button>
      </div>
    </div>

    <div id="qr-tool" class="tool-view">
      <textarea id="qrInput" class="text-input" placeholder="Type text or URL..." rows="2"></textarea>
      <div class="action-row">
        <button id="qrCurrentTabBtn" class="btn btn-main">Current Tab URL</button>
        <button id="qrDownloadBtn" class="btn btn-sub">Download</button>
      </div>
      <div class="qr-preview"><canvas id="qrCanvas" width="140" height="140"></canvas></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
