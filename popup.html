<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #1e1e2e;
      --card-bg: #2b2b3d;
      --text: #f8f8f2;
      --text-muted: #a6adc8;
      --accent: #89b4fa;
      --accent-hover: #74c7ec;
      --danger: #f38ba8;
      --border: #45475a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      width: 260px;
      padding: 16px;
      user-select: none;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .preview-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .color-display {
      width: 100%;
      height: 48px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background-color: #313244;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease;
    }

    .format-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    select {
      background-color: #313244;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }

    .color-value-input {
      flex: 1;
      background-color: #11111b;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 12px;
      text-align: center;
    }

    .format-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      font-color: var(--text-muted);
      font-family: monospace;
      background: #181825;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
    }

    .detail-label {
      color: var(--text-muted);
    }

    .button-group {
      display: flex;
      gap: 8px;
      width: 100%;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background-color: var(--accent);
      color: #11111b;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-secondary {
      background-color: #313244;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-action {
      display: none;
    }

    .palette-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 12px;
      min-height: 36px;
    }

    .swatch-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
    }

    .swatch {
      width: 100%;
      height: 100%;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
    }

    .delete-btn {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 14px;
      height: 14px;
      background-color: var(--danger);
      color: #fff;
      border-radius: 50%;
      font-size: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
    }

    .swatch-wrapper:hover .delete-btn {
      display: flex;
    }

    .export-btn {
      width: 100%;
      background-color: transparent;
      color: var(--text-muted);
      border: 1px dashed var(--border);
      font-size: 11px;
      padding: 6px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Color Picker</h1>
  </div>

  <div class="preview-card">
    <div id="preview" class="color-display"></div>

    <div class="format-row">
      <select id="formatSelect">
        <option value="HEX">HEX</option>
        <option value="RGB">RGB</option>
        <option value="HSL">HSL</option>
      </select>
      <input type="text" id="colorOutput" class="color-value-input" readonly value="#------">
    </div>

    <div class="format-details" id="detailsBox">
      <div class="detail-item"><span class="detail-label">RGB:</span> <span id="rgbVal">-</span></div>
      <div class="detail-item"><span class="detail-label">HSL:</span> <span id="hslVal">-</span></div>
    </div>
    
    <button id="pickBtn" class="btn-primary">Pick Color</button>
    
    <div class="button-group">
      <button id="copyBtn" class="btn-secondary btn-action">Copy</button>
      <button id="saveBtn" class="btn-secondary btn-action">Save</button>
    </div>
  </div>

  <div id="palette" class="palette-grid"></div>
  <button id="exportBtn" class="export-btn">Export CSS Variables</button>

  <script src="popup.js"></script>
</body>
</html>
